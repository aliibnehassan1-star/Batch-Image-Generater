name: Extract ZIP

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip visionbatch-ai.zip -d extracted

      - name: Commit extracted files
        run: |
          cp -r extracted/* .
          rm -rf extracted
          rm -f project.zip
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Extract ZIP"
          git push
